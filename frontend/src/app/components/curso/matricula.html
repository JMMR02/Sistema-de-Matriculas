<div class="container mt-4">
  <div class="row g-4">

    <h3 class="titulo-seccion matriculas">Matrículas</h3>

    <!-- FORMULARIO -->
    <div class="col-md-4">
      <div class="card shadow rounded-4">
        <div class="card-header bg-primary text-white text-center">
          <h5>Matricular Estudiante</h5>
        </div>

        <div class="card-body">

          <form #form="ngForm" (ngSubmit)="guardar(form)">

            <!-- CURSO -->
            <div class="mb-3">
              <label class="form-label fw-bold">Seleccionar Curso</label>
              <select 
                [(ngModel)]="matricula.fkIdCurso.idCurso"
                name="curso"
                class="form-control"
                required>

                <option value="">Seleccione curso</option>

                <option *ngFor="let c of cursos" [value]="c.idCurso">
                  {{c.nombreCurso}}
                </option>

              </select>
            </div>

            <!-- ESTUDIANTE -->
            <div class="mb-3">
              <label class="form-label fw-bold">Seleccionar Estudiante</label>
              <select 
                [(ngModel)]="matricula.fkIdEstudiante.idEstudiante"
                name="estudiante"
                class="form-control"
                required>

                <option value="">Seleccione estudiante</option>

                <option *ngFor="let e of estudiantes" [value]="e.idEstudiante">
                  {{e.nombreEstudiante}}
                </option>

              </select>
            </div>

            <!-- DESCRIPCIÓN -->
            <div class="mb-3">
              <input 
                type="text"
                class="form-control"
                name="descripcion"
                [(ngModel)]="matricula.descripcionMatricula"
                placeholder="Descripción">
            </div>

            <button class="btn btn-success w-100">
              Matricular
            </button>

          </form>

        </div>
      </div>
    </div>

    <!-- TABLA -->
    <div class="col-md-8">
      <div class="card shadow rounded-4">
        <div class="card-header bg-dark text-white text-center">
          <h5 class="mb-0">Lista de Matrículas</h5>
        </div>

        <div class="card-body">

          <table class="table table-hover">
            <thead>
              <tr>
                <th>Curso</th>
                <th>Estudiante</th>
                <th>Fecha</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let m of matriculas">

                <td>
                  {{ m.fkIdCurso?.nombreCurso }}
                </td>

                <td>
                  {{ m.fkIdEstudiante?.nombreEstudiante }}
                </td>

                <td>
                  {{ m.fechaMatricula | date:'short' }}
                </td>

              </tr>
            </tbody>

          </table>

        </div>
      </div>
    </div>

  </div>
</div>
